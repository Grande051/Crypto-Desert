version: "3.9"

services:
  # ── Servidor principal ────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-desert:latest
    container_name: crypto-desert-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - WEB_DIR=./web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/crypto"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - crypto-desert-net

networks:
  crypto-desert-net:
    driver: bridge
